webdriver.driver=chrome
webdriver.chrome.driver = src/test/resources/Drivers/chromedriver.exe
  webdriver.firefox.FirefoxDriver = driver/geckodriver
  serenity.project.name = AutomatizacionFacebook
  serenity.use.unique.browser = false
  serenity.browser.width=1600
  serenity.browser.height=800
  webdriver.timeouts.implicitlywait = 20000
  serenity.take.screenshots=AFTER_EACH_STEP
  serenity.verbose.steps=FALSE
  serenity.report.encoding=UTF8
  feature.file.encoding =UTF8
  serenity.test.root=net.thucydides.showcase.cucumber.junit
  chrome_preferences.behavior=allow
  serenity.driver.capabilities=name:proyecto;unhandledPromptBehavior:ignore;handlesAlerts:true
chrome.switches=--disable-infobars,--disable-notifications,--ignore-certificate-errors,--ignore-ssl-errors,--allow-insecure-localhost,--disable-password-manager-reauthentication,--disable-save-password-bubble,--password-store=basic,--disable-features=LeakDetection
